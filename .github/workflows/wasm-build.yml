# Smoke-build the wasm32 target on every push so the cross-platform
# build doesn't bitrot. Two jobs:
#
#   cargo-build-wasm: pure Rust → wasm32 compile. Catches Rust-side
#     regressions in cfg-gates, missing wasm32 deps, etc.
#
#   trunk-build: full pipeline — React UI + Rust → wasm-bindgen +
#     trunk packaging. Catches index.html / Trunk.toml / wasm-bindgen
#     CLI regressions that the cargo-only job misses.
#
# Native (macOS) build is not run here because the wry/objc2 deps in
# Cargo.toml's [target.'cfg(not(target_arch = "wasm32"))'.dependencies]
# table are mac-only at the source level, so a Linux/Windows native CI
# job would need either a macOS runner or a refactor to scope wry to
# cfg(target_os = "macos"). Punt for now — local mac builds catch it.
name: wasm-build

on:
  push:
  pull_request:

jobs:
  cargo-build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32

      - name: cargo build --target wasm32-unknown-unknown
        run: cargo build --target wasm32-unknown-unknown --bin deepspace-game

  trunk-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: trunk

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install trunk + wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: trunk,wasm-bindgen-cli

      # Trunk.toml's watch-ignore list canonicalizes a handful of paths
      # that don't exist in a fresh checkout. trunk *build* doesn't
      # watch, but the loader resolves the same list — empties keep it
      # quiet. Mirrors scripts/dev-wasm.sh.
      - name: Create Trunk-ignore stub dirs
        run: mkdir -p .claude external tests docs

      - name: Build React UI bundle
        working-directory: ui
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: trunk build
        run: trunk build

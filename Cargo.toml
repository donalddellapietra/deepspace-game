[package]
name = "deepspace-game"
version = "0.1.0"
edition = "2024"
default-run = "deepspace-game"

[features]
dev = ["bevy/dynamic_linking"]
debug_import = []
textures = []

[dependencies]
bevy = { version = "0.18", features = ["experimental_bevy_ui_widgets", "webgpu"] }
dot_vox = "5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
fastnoise-lite = "1"
bytemuck = { version = "1", features = ["derive"] }
bincode = "1"
lz4_flex = "0.11"
ruzstd = "0.7"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
zstd = "0.13"
tungstenite = "0.26"
wry = { version = "0.47", features = ["transparent"] }
raw-window-handle = "0.6"
objc2 = "0.5"
objc2-foundation = "0.2"
objc2-app-kit = { version = "0.2", features = ["NSView", "NSResponder", "NSWindow"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["Window"] }
getrandom = { version = "0.3", features = ["wasm_js"] }

# Bevy is unusable in debug without this
[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = "z"
lto = true
strip = true

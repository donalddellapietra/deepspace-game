[package]
name = "deepspace-game"
version = "0.1.0"
edition = "2024"

[features]
dev = ["bevy/dynamic_linking"]
debug_import = []

[dependencies]
bevy = { version = "0.18", features = ["experimental_bevy_ui_widgets"] }
bevy_egui = { version = "0.39", default-features = false, features = ["manage_clipboard", "open_url", "default_fonts", "render", "bevy_ui"] }
dot_vox = "5"

# Bevy is unusable in debug without this
[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = "z"
lto = true
strip = true

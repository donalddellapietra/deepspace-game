[package]
name = "deepspace-game"
version = "0.1.0"
edition = "2024"

[features]
dev = ["bevy/dynamic_linking"]
debug_import = []

[dependencies]
bevy = "0.18"
dot_vox = "5"

# Bevy is unusable in debug without this
[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = "z"
lto = true
strip = true

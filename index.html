<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deep Space</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
    <!-- React UI overlay assets (copied to dist/) -->
    <link data-trunk rel="copy-file" href="ui/dist/ui.css" />
    <link data-trunk rel="copy-file" href="ui/dist/ui.js" />
    <link rel="stylesheet" href="ui.css" />
</head>
<body>
    <!-- Bevy WASM game -->
    <link data-trunk rel="rust" data-wasm-opt="z" data-wasm-opt-params="--enable-bulk-memory --enable-bulk-memory-opt --enable-nontrapping-float-to-int" />

    <!-- React UI mounts here, on top of the canvas -->
    <div id="root"></div>

    <script type="module" src="ui.js"></script>
</body>
</html>
